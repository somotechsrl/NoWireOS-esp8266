[env:cubecell_board]
platform = heltec-cubecell
board = cubecell_board
framework = arduino
monitor_speed = 9600
board_build.arduino.lorawan.rgb = ACTIVE
board_build.arduino.lorawan.region = EU868
board_build.arduino.lorawan.adr = OFF
build_flags = -D CUBE_CELL -DCORE_DEBUG_LEVEL=5 
lib_ignore = MQTT
lib_deps = 
	256dpi/MQTT@^2.5.2
	adafruit/Adafruit NeoPixel@^1.15.4
	boseji/rBase64@^1.1.1
	lualtek/cubecell-device-lib@^0.2.1
	smfsw/Queue@^2.1
